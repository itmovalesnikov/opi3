<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Форма ввода данных</title>
    <h:outputStylesheet library="css" name="main.css" />

</h:head>

<body>
    <main>
        <div id="notifications"></div>

        <h:form id="main_form">
            <h:link value="Вернуться на стартовую страницу" outcome="index" styleClass="link" />
            <table>
                <tr>
                    <td colspan="2">
                        <svg id="graph" xmlns="http://www.w3.org/2000/svg" viewBox="-1.5 -1.5 3 3">
                            <!-- Фигуры -->
                            <g fill="lightblue">
                                <path class="reverse" d="M0,0 L-0.5,0 A0.5,0.5 0 0,0 0,0.5 Z" />
                                <rect class="reverse" x="0" y="0" width="0.5" height="1" />
                                <polygon class="reverse" points="0,0 0,-1 -0.5,0" />
                            </g>

                            <!-- Маркер стрелки -->
                            <defs>
                                <marker id="arrow" markerWidth="6" markerHeight="6" refX="0" refY="3" orient="auto"
                                    markerUnits="strokeWidth">
                                    <path d="M0,0 L0,6 L6,3 Z" fill="black" />
                                </marker>
                            </defs>

                            <!-- Оси и деления -->
                            <g stroke="black" stroke-width="0.01">
                                <!-- Оси -->
                                <g marker-end="url(#arrow)">
                                    <line class="reverse" x1="0" y1="1.3" x2="0" y2="-1.3" />
                                    <line class="reverse" x1="-1.3" y1="0" x2="1.3" y2="0" />
                                </g>
                                <!-- Деления по X -->
                                <line x1="-0.5" y1="-0.03" x2="-0.5" y2="0.03" />
                                <line x1="-1" y1="-0.03" x2="-1" y2="0.03" />
                                <line x1="0.5" y1="-0.03" x2="0.5" y2="0.03" />
                                <line x1="1" y1="-0.03" x2="1" y2="0.03" />

                                <!-- Деления по Y -->
                                <line x1="-0.03" y1="0.5" x2="0.03" y2="0.5" />
                                <line x1="-0.03" y1="1" x2="0.03" y2="1" />
                                <line x1="-0.03" y1="-0.5" x2="0.03" y2="-0.5" />
                                <line x1="-0.03" y1="-1" x2="0.03" y2="-1" />
                            </g>

                            <!-- Подписи -->
                            <g font-size="0.12" text-anchor="middle" alignment-baseline="middle">
                                <!-- Оси -->
                                <text x="1.3" y="-0.07">x</text>
                                <text x="0.1" y="-1.3">y</text>

                                <!-- X-axis -->
                                <text class="r neg half" x="-0.5" y="-0.07">-R/2</text>
                                <text class="r neg" x="-1" y="-0.07">-R</text>
                                <text class="r half" x="0.5" y="-0.07">R/2</text>
                                <text class="r" x="1" y="-0.07">R</text>

                                <!-- Y-axis -->
                                <text class="r neg half" x="0.16" y="0.5">-R/2</text>
                                <text class="r neg" x="0.12" y="1">-R</text>
                                <text class="r half" x="0.16" y="-0.5">R/2</text>
                                <text class="r" x="0.12" y="-1">R</text>
                            </g>

                        </svg>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="input_x">X:</label>
                    </td>
                    <td>
                        <p:inputText id="x_value" value="#{pointsBean.x}" style="pointer-events:none;"/>
                        <p:slider for="x_value" id="slider_x" minValue="-2" maxValue="2" step="1" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="select_y">Y:</label>
                    </td>
                    <td>
                        <h:inputText id="input_y" value="#{pointsBean.y}">
                            <f:validator validatorId="yValueValidator" />
                        </h:inputText>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <p:message for="input_y" display="text" />
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="select_r">R:</label>
                    </td>
                    <td>
                        <p:selectOneRadio id="select_r" value="#{pointsBean.r}" onchange="onRadioChange(this.value)">
                            <f:selectItem itemValue="1" itemLabel="1" />
                            <f:selectItem itemValue="1.5" itemLabel="1.5" />
                            <f:selectItem itemValue="2" itemLabel="2" />
                            <f:selectItem itemValue="2.5" itemLabel="2.5" />
                            <f:selectItem itemValue="3" itemLabel="3" />
                        </p:selectOneRadio>
                    </td>
                </tr>


                <tr>
                    <td colspan="2">
                        <h:commandButton value="Submit" action="#{pointsBean.submit}" id="submit-btn" />
                    </td>
                </tr>
            </table>
        </h:form>

        <h:dataTable value="#{pointsBean.points}" var="point" id="result">
            <h:column>
                <f:facet name="header">X</f:facet>
                #{point.x}
            </h:column>
            <h:column>
                <f:facet name="header">Y</f:facet>
                #{point.y}
            </h:column>
            <h:column>
                <f:facet name="header">R</f:facet>
                #{point.r}
            </h:column>
            <h:column>
                <f:facet name="header">Result</f:facet>
                <h:outputText value="#{point.hit ? 'hit' : 'miss'}" styleClass="#{point.hit ? 'hit-yes' : 'hit-no'}" />
            </h:column>
        </h:dataTable>
    </main>

    <h:outputScript library="js" name="script.js" />
</body>

</html>
