<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:p="http://primefaces.org/ui">
<h:head>
    <title>Стартовая страница</title>
    <h:outputStylesheet library="css" name="index.css" />
</h:head>

<h:body>
    <div class="container">
        <header>
            <p>Лесников Владимир Алексеевич</p>
            <p>Группа P3214</p>
            <p>Вариант 3477</p>
            <h:outputText id="clock" value="#{clockBean.currentTime}" />
            <p:poll interval="13" update="clock" />
        </header>

        <h:form>
            <h:link value="Перейти на основную страницу" outcome="main" styleClass="link" />
        </h:form>
    </div>
</h:body>

</html>
