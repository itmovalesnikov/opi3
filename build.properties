# ============================================================================
# Apache Ant Build Properties для Web3 Проекта
# ============================================================================

# Параметры проекта
project.name=web3
project.version=1.0-SNAPSHOT
project.author=ITMO Lab3
main.class=com.github.itmovalesnikov.web3.bean.PointsBean

# Директории исходного кода
src.dir=src/main/java
src.test.dir=src/test/java
resources.dir=src/main/resources
resources.test.dir=src/test/resources
web.dir=src/main/webapp

# Директории сборки
build.dir=build
classes.dir=build/classes
test.classes.dir=build/test-classes
dist.dir=dist
docs.javadoc.dir=build/docs/javadoc
reports.dir=build/reports
temp.dir=build/temp

# Директории библиотек
lib.compile.dir=lib/compile
lib.package.dir=lib/package

# Параметры упаковки
war.filename=${project.name}.war
war.path=${dist.dir}/${war.filename}

# Параметры документации
manifest.file=MANIFEST.MF
manifest.path=${build.dir}/META-INF/${manifest.file}

# ZIP архив для git истории
git.archive.filename=team-builds.zip
git.archive.path=${dist.dir}/${git.archive.filename}
git.revisions=2

# Кодировка проекта
project.encoding=UTF-8